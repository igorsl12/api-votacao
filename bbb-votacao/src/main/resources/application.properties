# URL de conexão (substitua pelo host e porta que aparecem na sua tela)
spring.datasource.url=jdbc:mysql://mysql-3ff9ba06-sistemadevotacao.b.aivencloud.com:13781/defaultdb?ssl-mode=REQUIRED

# Senha (clique em REVELAR_SENHA na sua tela e cole aqui)
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Driver e Hibernate
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true